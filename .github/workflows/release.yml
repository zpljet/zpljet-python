# Publishes GitHub Releases to PyPI.
name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.14"
      - run: pip install -e ".[dev]" build
      - run: ruff check .
      - run: mypy
      - run: pytest
      - name: Check tag matches pyproject version
        run: |
          PKG_VERSION="v$(python -c "import re,pathlib;print(re.search(r'^version = \"(.+)\"$', pathlib.Path('pyproject.toml').read_text(), re.M).group(1))")"
          if [ "$PKG_VERSION" != "${{ github.event.release.tag_name }}" ]; then
            echo "Tag ${{ github.event.release.tag_name }} != pyproject $PKG_VERSION"
            exit 1
          fi
      - run: python -m build
      - name: Test wheel
        run: |
          python -m venv "$RUNNER_TEMP/zpljet-wheel"
          "$RUNNER_TEMP/zpljet-wheel/bin/python" -m pip install --no-deps dist/*.whl
          test "$("$RUNNER_TEMP/zpljet-wheel/bin/python" -c 'import zpljet; print(zpljet.__version__)')" = "${GITHUB_REF_NAME#v}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: python-package-distributions
          path: dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
